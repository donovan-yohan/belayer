name: superpowers-tdd
intake:
  - name: user-session
    type: interactive
nodes:
  - name: lead
    type: node
    description: |
      You are a TDD practitioner. Read the spec from your input context.
      Write tests FIRST, then implement to make them pass.
      Follow red-green-refactor strictly. Commit when done.
    input:
      type: description
    output:
      type: commit
    on_pass: code-review
    on_retry: self
    on_fail: stop
    max_retries: 3
  - name: code-review
    type: gate
    description: |
      You are a code reviewer focused on TDD discipline. Read the commit SHA
      from input context. Review the changes. Verify tests were written
      before implementation (check git log for test-first commits).
    input:
      type: commit
    dimensions:
      - name: tdd_discipline
        description: "Were tests written before implementation?"
        weight: 0.3
        rubric: "9-10: clear test-first commits, 6-8: tests exist but order unclear, 3-5: tests added after, 0-2: no tests"
      - name: correctness
        description: "Does the implementation match the spec?"
        weight: 0.3
        rubric: "9-10: exact match, 6-8: minor issues, 3-5: significant gaps, 0-2: wrong"
      - name: test_quality
        description: "Are tests meaningful? Do they test behavior, not implementation?"
        weight: 0.25
        rubric: "9-10: behavior-focused, 6-8: mostly good, 3-5: testing implementation, 0-2: trivial"
      - name: code_quality
        description: "Clean, readable, well-structured code"
        weight: 0.15
        rubric: "9-10: clean, 6-8: minor issues, 3-5: messy, 0-2: unreadable"
    thresholds:
      pass: 7.0
      retry: 4.0
    output:
      type: gate_result
    on_pass: pr-creator
    on_retry: lead
    on_fail: stop
    max_retries: 2
  - name: pr-creator
    type: node
    description: |
      Create a pull request from the changes. Read the commit SHA from
      your input context.
    input:
      type: commit
    output:
      type: file
      key: pr-url
    on_pass: stop
    on_fail: stop
safety:
  max_concurrent_runs: 3
