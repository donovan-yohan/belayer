name: gstack-review-loop
intake:
  - name: user-session
    type: interactive
nodes:
  - name: lead
    type: node
    description: |
      You are the lead implementer. Read the spec from your input context.
      Implement the feature. Write tests. Commit your changes when done.
    input:
      type: description
    output:
      type: commit
    on_pass: code-review
    on_retry: self
    on_fail: stop
    max_retries: 3
  - name: code-review
    type: gate
    description: |
      You are an adversarial code reviewer. Read the commit SHA and base ref
      from your input context. Review the changes for quality, correctness,
      and adherence to the spec.
    input:
      type: commit
    dimensions:
      - name: correctness
        description: "Does the code do what the spec says?"
        weight: 0.3
        rubric: "9-10: exact match, 6-8: minor issues, 3-5: significant gaps, 0-2: wrong"
      - name: architecture
        description: "Clean abstractions, proper separation of concerns?"
        weight: 0.25
        rubric: "9-10: elegant, 6-8: minor structural issues, 3-5: major problems, 0-2: no structure"
      - name: test_coverage
        description: "Are changes tested? Edge cases covered?"
        weight: 0.25
        rubric: "9-10: comprehensive, 6-8: happy path, 3-5: minimal, 0-2: untested"
      - name: code_quality
        description: "Naming, style, no dead code, no duplication"
        weight: 0.2
        rubric: "9-10: clean, 6-8: minor issues, 3-5: inconsistent, 0-2: unreadable"
    thresholds:
      pass: 7.0
      retry: 4.0
    output:
      type: gate_result
    on_pass: qa-gate
    on_retry: lead
    on_fail: stop
    max_retries: 2
  - name: qa-gate
    type: gate
    description: |
      You are a QA tester. Read the commit SHA from your input context.
      Test the application end-to-end. Verify the feature works, edge cases
      are handled, and no regressions exist.
    input:
      type: commit
    dimensions:
      - name: functionality
        description: "Does the feature work as specified?"
        weight: 0.4
        rubric: "9-10: fully working, 6-8: works with minor issues, 3-5: partially broken, 0-2: non-functional"
      - name: edge_cases
        description: "Are edge cases and error states handled?"
        weight: 0.3
        rubric: "9-10: all covered, 6-8: most covered, 3-5: few covered, 0-2: none"
      - name: regression
        description: "No regressions in existing functionality?"
        weight: 0.3
        rubric: "9-10: no regressions, 6-8: minor regressions, 3-5: significant regressions, 0-2: broken"
    thresholds:
      pass: 8.0
      retry: 5.0
    output:
      type: gate_result
    on_pass: pr-creator
    on_retry: lead
    on_fail: stop
    max_retries: 1
  - name: pr-creator
    type: node
    description: |
      Create a pull request from the changes. Read the commit SHA from
      your input context. Use the git branch to create a PR.
    input:
      type: commit
    output:
      type: file
      key: pr-url
    on_pass: stop
    on_fail: stop
safety:
  max_concurrent_runs: 3
