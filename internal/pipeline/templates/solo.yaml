name: solo
intake:
  - name: user-session
    type: interactive
nodes:
  - name: lead
    type: node
    description: |
      You are the lead. Implement the spec. Write tests. Commit when done.
    input: { type: description }
    output: { type: commit }
    on_pass: spotter
    on_retry: self
    on_fail: stop
    max_retries: 3
  - name: spotter
    type: gate
    description: |
      Review the code for spec compliance and test coverage.
    input: { type: commit }
    dimensions:
      - { name: spec_compliance, weight: 0.35, description: "Do changes match the spec?" }
      - { name: test_contracts, weight: 0.3, description: "Are tests meaningful?" }
      - { name: runtime_correctness, weight: 0.35, description: "Would this work in production?" }
    thresholds: { pass: 7.0, retry: 4.0 }
    output: { type: gate_result }
    on_pass: stop
    on_retry: lead
    on_fail: stop
    max_retries: 2
safety:
  max_concurrent_runs: 3
