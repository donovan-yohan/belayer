[agents]
provider = "claude"
lead_model = "opus"
review_model = "sonnet"
permissions = "dangerously-skip"

[execution]
max_leads = 8
poll_interval = "5s"
stale_timeout = "30m"
max_retries = 3

[validation]
enabled = true
auto_detect_project = true
fallback_profile = "library"
browser_tool = "chrome-devtools"

[anchor]
enabled = true
max_attempts = 2

[tracker]
provider = "github"
label = "belayer"
sync_interval = "24h"

[tracker.github]

[tracker.jira]
base_url = ""
project = ""

[review]
poll_interval = "60s"
ci_fix_attempts = 2
auto_merge = false

[pr]
stack_threshold = 1000
draft = true

[environment]
command = "belayer"
subcommand = "env"
snapshot = ""
