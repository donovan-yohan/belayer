Port 8888
# Listen on all interfaces — required for Docker networking so agent containers
# on the same compose network can reach the proxy. This port must NOT be
# published to the host (no "ports:" mapping in docker-compose.yml).
Listen 0.0.0.0
# Restrict clients to loopback and RFC1918 ranges (Docker internal networks)
Allow 127.0.0.1
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16
Timeout 600
MaxClients 100
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterURLs On
