# Clamshell policy for extend-fullstack agents.
# Extends the base git-and-anthropic preset with package manager access
# for Gradle (Maven Central, Gradle Plugin Portal) and npm.

version: 5
sandbox:
  user: sandbox
  group: sandbox
  work_dir: /workspace
  runtime_dir: /run/agent
  artifact_outbox: /run/agent/outbox
  read_only_paths:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /var/log
    - /app
  read_write_paths:
    - /tmp
    - /workspace
    - /run/agent
    - /run/agent/outbox
  masked_paths:
    - /proc/kcore
    - /proc/latency_stats
    - /proc/timer_list
    - /sys/firmware
  tmpfs_paths:
    - /tmp
process:
  seccomp_profile: ./etc/seccomp-default.json
  no_new_privileges: true
  drop_capabilities: ['ALL']
  memory_limit: 2048m
  pids_limit: 256
  cpu_quota: 200000
  read_only_rootfs: true
ebpf:
  enabled: false

network:
  mode: proxy
  proxy_listen: 3128
  allow_http: false
  providers:
    # Version control
    github: true
    # AI APIs (credential injection via inference.local)
    anthropic_api: true
    openai_api: true
    # Package managers
    npm: true
    pypi: true
    # Extend-specific: Gradle/Maven dependencies
    # These would need to be defined as custom providers in clamshell
    # or added to the provider catalog:
    #   maven_central: repo1.maven.org, repo.maven.apache.org
    #   gradle_plugins: plugins.gradle.org, services.gradle.org
  localhost: []
