name: extend-fullstack
description: "Extend fullstack — extend-api (Kotlin/Spring Boot) + extend-app (Node/TypeScript/rspack)"

repos:
  - name: extend-api
    path: ~/Documents/Programs/work/extend-api
  - name: extend-app
    path: ~/Documents/Programs/work/extend-app

clamshell:
  policy: extend-fullstack.yaml

agents:
  - template: pilot
  - template: api-implementer
    repo: extend-api
  - template: app-implementer
    repo: extend-app

workbench:
  spec: workbench.yaml

tools:
  - name: curl-api
    description: "HTTP request to the running extend-api"
    input: { method: string, path: string }
    exec:
      target: workbench
      command: 'curl -s -X {{.method}} http://extend-api:8080{{.path}}'

  - name: curl-app
    description: "HTTP request to the running extend-app"
    input: { method: string, path: string }
    exec:
      target: workbench
      command: 'curl -s -X {{.method}} http://extend-app:3000{{.path}}'

  - name: db-query
    description: "Read-only SQL query against the session database"
    input: { query: string }
    exec:
      target: infra
      command: 'psql -U belayer_ro -d extend_{{.SessionID}} -c "{{.query}}"'
    constraints: { read_only: true, audit: true }

  - name: build-api
    description: "Build extend-api and return errors"
    exec:
      target: workbench
      command: "cd /workspace/extend-api && ./gradlew build 2>&1 | tail -50"

  - name: build-app
    description: "Typecheck extend-app and return errors"
    exec:
      target: workbench
      command: "cd /workspace/extend-app && npm run typecheck 2>&1 | tail -50"

  - name: api-logs
    description: "Tail recent extend-api server logs"
    input: { lines: int }
    exec:
      target: workbench
      command: 'docker logs extend-api-{{.SessionID}} --tail {{.lines}} 2>&1'

reflection:
  vendor: claude
  model: sonnet
  trigger: post-session
  limits:
    max_review_loops: 10
    max_session_duration: 4h
