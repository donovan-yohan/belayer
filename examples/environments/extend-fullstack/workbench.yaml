timeout: 5m
services:
  - name: postgres
    image: postgres:16
    environment:
      POSTGRES_DB: "extend_{{.SessionID}}"
      POSTGRES_USER: extend
      POSTGRES_PASSWORD: localdev
    ports: ["5432"]
    networks: ["infra-net"]
    health_check:
      test: ["CMD", "pg_isready", "-U", "extend"]
      interval: 5s
      timeout: 3s
      retries: 10

  - name: localstack
    image: localstack/localstack:3
    ports: ["4566"]
    networks: ["infra-net"]

  - name: rabbitmq
    image: rabbitmq:3-management
    ports: ["5672", "15672"]
    networks: ["infra-net"]

  - name: extend-api
    build:
      context: "{{.Worktree.extend-api}}"
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/extend_{{.SessionID}}"
      SPRING_DATASOURCE_USERNAME: extend
      SPRING_DATASOURCE_PASSWORD: localdev
      SPRING_PROFILES_ACTIVE: local
      AWS_ENDPOINT: "http://localstack:4566"
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8080"]
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      start_period: 90s
      retries: 24

  - name: extend-app
    build:
      context: "{{.Worktree.extend-app}}"
    environment:
      API_BASE_URL: "http://extend-api:8080"
    depends_on:
      extend-api:
        condition: service_healthy
    ports: ["3000"]
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 12
