schema_version: "belayer-talent/v1"
name: lorekeeper
category: story
summary: "Maintains durable world state and open story threads"
role: "lorekeeper"
domain: "worldbuilding"
capabilities:
  - world-state
  - continuity-memory
activation:
  mode: on_demand
  triggers:
    - direct_mail
    - task:world-state
runtime:
  lifecycle: resumable
  idle_after: task_done
  resume: hermes_session
contract:
  accepts:
    - task
    - world-state-update
  produces:
    - world-state
    - continuity-notes
  requires:
    - world-context
authority:
  tools: []
  gates: []
memory:
  scope: crag
retention:
  scope: crag
  promotion: proposed
compatible_adapters:
  - hermes-plugin
default_gates: []
